<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/home.css') }}">
</head>

<body>
    <div class="grid-main">
        <nav class="grid1-main">
            {% include 'includes/navbar.html' %}
        </nav>
        <div class="grid2-main">
            <div class="container">
                <!-- id, název, známka, finální známka, body, procenta -->
                {% for i in subjects %}
                <a href="{{ url_for('subject', subject_id=i[0]) }}">
                    <div class="grid">
                        <div class="grid1">{{i[1]}}<hr class="hr-display"></div>
                        <div class="grid2">{{i[2]}}</div>
                        <div class="grid3">{{i[4]}}</div>
                        <div class="grid4">{{i[5]}}</div>
                    </div>
                </a>
                {% endfor %}
            </div>
        </div>
        <div class="grid3-main">
            <div class="container">
                {%for row in znamky%}
                <div class="grid-znamka">
                    <div class="grid-znamka-1">{{row[1]}}</div>
                    <div class="grid-znamka-2">{{row[0]}} </div>
                    <div class="grid-znamka-3">{{row[2]}}</div>
                    <div class="grid-znamka-4">{{row[6]}}</div>
                    <div class="grid-znamka-5">{{row[3]}}</div>
                    <div class="grid-znamka-6">{{row[4]}}</div>
                    <div class="grid-znamka-7">{{row[5]}}</div>
                </div>
                {%endfor%}
            </div>
        </div>
    </div>
</body>

</html>
